filter:
  excluded_paths:
    - 'tests/*'
checks:
  php: true
before_commands:
  - composer install --dev
tools:
  php_code_coverage: true
build:
  environment:
    php:
      version: 7.4
  tests:
    override:
      -
        command: vendor/bin/phpunit --coverage-clover=clover.xml
        coverage:
          file: clover.xml
          format: php-clover
